[Strategy]
fast_ma = 5
slow_ma = 20
long_ma = 60
rsi_period = 14
volume_ma = 20

[Filter]
enable_trend_filter = true
market_index = 000300.SH
market_long_ma = 60
test_mode = false   # 设为 true 可在周末测试

[ATR]
atr_period = 14
stop_loss_atr = 2.0
take_profit_atr = 3.0
max_position_ratio = 0.2

[Buy]
buy_ratio = 0.2
min_buy_shares = 100

[Sell]
enable_take_profit = true
enable_stop_loss = true
take_profit_levels = 0.2:0.5, 0.3:0.3, 0.5:1.0
stop_loss_levels = -0.08:1.0

[TradeLog]
log_file = trade_log.csv